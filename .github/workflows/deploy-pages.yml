name: Deploy Centauri Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'build_master_doc.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Centauri Master Document
        run: python build_master_doc.py

      - name: Build HTML site
        run: |
          mkdir -p _site/centauri
          mkdir -p _site/chapters

          # Copy raw markdown artifacts
          cp -r docs/centauri/. _site/chapters/
          cp docs/Centauri_Master_Document.md _site/

          # Generate index.html landing page
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Project Alpha Centauri | CIS Framework</title>
            <meta name="description" content="30-phase SBIR and TRL-aligned maturation pipeline for Project Alpha Centauri. NASA Artemis lunar technology development framework.">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
            <style>
              :root {
                --bg: #030510;
                --surface: rgba(255,255,255,0.03);
                --border: rgba(255,255,255,0.08);
                --primary: #00c6ff;
                --secondary: #7b2fff;
                --accent: #ff6b35;
                --text: #e8eaf6;
                --muted: rgba(232,234,246,0.5);
              }
              * { margin:0; padding:0; box-sizing:border-box; }
              html { scroll-behavior: smooth; }
              body {
                background: var(--bg);
                color: var(--text);
                font-family: 'Outfit', sans-serif;
                min-height: 100vh;
                background-image:
                  radial-gradient(ellipse at 10% 20%, rgba(0,198,255,0.06) 0%, transparent 55%),
                  radial-gradient(ellipse at 90% 80%, rgba(123,47,255,0.06) 0%, transparent 55%),
                  radial-gradient(ellipse at 50% 50%, rgba(255,107,53,0.03) 0%, transparent 70%);
              }

              /* Stars background */
              body::before {
                content:'';
                position:fixed;
                inset:0;
                background-image:
                  radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
                  radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                  radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.35) 0%, transparent 100%),
                  radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
                  radial-gradient(1px 1px at 95% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
                  radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
                  radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.25) 0%, transparent 100%),
                  radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.3) 0%, transparent 100%);
                pointer-events: none;
                z-index: 0;
              }

              nav {
                position: fixed;
                top: 0; left: 0; right: 0;
                z-index: 100;
                padding: 18px 8%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                backdrop-filter: blur(20px);
                background: rgba(3,5,16,0.8);
                border-bottom: 1px solid var(--border);
              }
              .nav-logo {
                font-weight: 900;
                font-size: 1.1rem;
                letter-spacing: 3px;
                background: linear-gradient(90deg, var(--primary), var(--secondary));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                text-transform: uppercase;
              }
              .nav-links { display:flex; gap:30px; }
              .nav-links a {
                color: var(--muted);
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 400;
                transition: color 0.2s;
              }
              .nav-links a:hover { color: var(--primary); }

              /* Hero */
              .hero {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 120px 8% 80px;
              }
              .hero-badge {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 6px 16px;
                border: 1px solid rgba(0,198,255,0.3);
                border-radius: 50px;
                font-size: 0.75rem;
                font-family: 'JetBrains Mono', monospace;
                color: var(--primary);
                margin-bottom: 32px;
                background: rgba(0,198,255,0.05);
                letter-spacing: 1px;
              }
              .hero-badge::before { content:'◉'; animation: pulse 2s infinite; }
              @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

              h1 {
                font-size: clamp(2.5rem, 7vw, 5.5rem);
                font-weight: 900;
                line-height: 1.05;
                letter-spacing: -1px;
                margin-bottom: 24px;
              }
              .gradient-text {
                background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              }
              .hero-sub {
                font-size: 1.15rem;
                color: var(--muted);
                max-width: 600px;
                line-height: 1.7;
                margin-bottom: 48px;
              }
              .hero-buttons { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
              .btn {
                padding: 14px 32px;
                border-radius: 50px;
                font-size: 0.95rem;
                font-weight: 600;
                text-decoration: none;
                transition: all 0.25s;
                display: inline-flex;
                align-items: center;
                gap: 8px;
              }
              .btn-primary {
                background: linear-gradient(135deg, var(--primary), var(--secondary));
                color: #fff;
                box-shadow: 0 4px 24px rgba(0,198,255,0.3);
              }
              .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,198,255,0.4); }
              .btn-outline {
                border: 1px solid var(--border);
                color: var(--text);
                background: var(--surface);
              }
              .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

              /* Stats bar */
              .stats-bar {
                position: relative;
                z-index: 1;
                display: flex;
                justify-content: center;
                gap: 0;
                flex-wrap: wrap;
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
