              .stat {
                padding: 28px 48px;
                text-align: center;
                border-right: 1px solid var(--border);
                flex: 1;
                min-width: 160px;
              }
              .stat:last-child { border-right: none; }
              .stat-num {
                font-size: 2.2rem;
                font-weight: 900;
                background: linear-gradient(135deg, var(--primary), var(--secondary));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-family: 'JetBrains Mono', monospace;
              }
              .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

              /* Sections */
              .section {
                position: relative;
                z-index: 1;
                padding: 100px 8%;
                max-width: 1300px;
                margin: 0 auto;
              }
              .section-label {
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.75rem;
                color: var(--primary);
                letter-spacing: 3px;
                text-transform: uppercase;
                margin-bottom: 16px;
              }
              .section-title {
                font-size: clamp(1.8rem, 4vw, 2.8rem);
                font-weight: 800;
                margin-bottom: 16px;
              }
              .section-sub {
                color: var(--muted);
                font-size: 1rem;
                line-height: 1.7;
                max-width: 560px;
                margin-bottom: 60px;
              }

              /* Phase grid */
              .phases-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
                gap: 20px;
              }
              .phase-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 28px;
                transition: all 0.3s;
                position: relative;
                overflow: hidden;
              }
              .phase-card::before {
                content:'';
                position:absolute;
                inset:0;
                opacity:0;
                transition: opacity 0.3s;
                border-radius: 16px;
              }
              .phase-card:hover { transform: translateY(-4px); border-color: rgba(0,198,255,0.3); }
              .phase-card:hover::before { opacity:1; }
              .phase-header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
              .phase-icon {
                width: 44px; height: 44px;
                border-radius: 10px;
                display: flex; align-items: center; justify-content: center;
                font-size: 1.2rem;
                flex-shrink: 0;
              }
              .phase-icon.a { background: rgba(0,198,255,0.15); }
              .phase-icon.b { background: rgba(123,47,255,0.15); }
              .phase-icon.c { background: rgba(255,107,53,0.15); }
              .phase-icon.d { background: rgba(0,230,118,0.15); }
              .phase-icon.e { background: rgba(255,214,0,0.15); }
              .phase-icon.f { background: rgba(255,61,113,0.15); }
              .phase-name { font-weight: 700; font-size: 1.05rem; }
              .phase-trl { font-size: 0.75rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
              .phase-artifacts { list-style: none; }
              .phase-artifacts li {
                padding: 7px 0;
                border-bottom: 1px solid rgba(255,255,255,0.05);
                font-size: 0.85rem;
                color: var(--muted);
                display: flex;
                align-items: center;
                gap: 10px;
              }
              .phase-artifacts li:last-child { border-bottom: none; }
              .phase-artifacts li::before { content:'→'; color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
              .artifact-id { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--primary); min-width: 80px; }

              /* Master doc CTA */
              .master-doc-cta {
                position: relative;
                z-index: 1;
                margin: 0 8%;
                padding: 60px;
                border-radius: 24px;
                background: linear-gradient(135deg, rgba(0,198,255,0.08) 0%, rgba(123,47,255,0.08) 100%);
                border: 1px solid rgba(0,198,255,0.2);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 40px;
                flex-wrap: wrap;
              }
              .master-doc-cta h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
              .master-doc-cta p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; max-width: 500px; }

              /* Footer */
              footer {
                position: relative;
                z-index: 1;
                border-top: 1px solid var(--border);
                padding: 40px 8%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 16px;
                margin-top: 80px;
              }
              .footer-brand { font-weight: 700; font-size: 0.9rem; opacity: 0.6; }
              .footer-links { display:flex; gap:24px; }
              .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
              .footer-links a:hover { color: var(--primary); }

              @media (max-width: 768px) {
                .stat { padding: 20px 24px; }
                .master-doc-cta { padding: 40px 28px; }
                footer { flex-direction: column; text-align: center; }
              }
            </style>
          </head>
