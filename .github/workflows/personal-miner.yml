name: Personal Miner (Depenabot Finance)

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:      # Allows manual trigger

jobs:
  finance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Run Personal Miner
        run: node scripts/personal-miner.js
      
      - name: Commit Ledger Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated financing update via Personal Miner (Depenabot)"
          file_pattern: "PROJECT_LEDGER.json"
