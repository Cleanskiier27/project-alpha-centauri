<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI CINEMATIC OVERLAY</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #9d00ff;
            --cinematic-red: #ff0044;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Consolas', monospace;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            border: 20px solid rgba(0,0,0,0.8);
            box-sizing: border-box;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
        }
        .scanner-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: var(--neon-blue);
            opacity: 0.3;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .hud-text {
            position: absolute;
            padding: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-blue);
        }
        .top-left { top: 30px; left: 30px; border-left: 2px solid var(--neon-blue); padding-left: 10px; }
        .top-right { top: 30px; right: 30px; border-right: 2px solid var(--neon-purple); text-align: right; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; color: var(--cinematic-red); }
        .visualizer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 100px;
        }
        .bar {
            width: 8px;
            background: var(--neon-blue);
            transition: height 0.1s ease;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .glitch {
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="scanner-line"></div>
        <div class="hud-text top-left">
            SYSTEM_AGI_HOST: ACTIVE<br>
            THOUGHT_PROCESS: RUNNING<br>
            <span id="mood">MOOD: CINEMATIC</span>
        </div>
        <div class="hud-text top-right">
            FRAME_BUFFER: 60FPS<br>
            LATENCY: 1.2ms<br>
            <span id="node-id">NODE: 0x4F2A</span>
        </div>
        <div class="hud-text bottom-left glitch" id="agi-text">
            AGI_STREAM_CORE_4432
        </div>
        
        <div class="visualizer" id="visualizer">
            <!-- Bars will be added here -->
        </div>
    </div>

    <script>
        // Create bars
        const viz = document.getElementById('visualizer');
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '10px';
            viz.appendChild(bar);
        }

        async function updateTelemetry() {
            try {
                const res = await fetch('/api/agi/status');
                const data = await res.json();
                
                document.getElementById('mood').textContent = `MOOD: ${data.music.mood}`;
                document.getElementById('agi-text').textContent = data.video.overlay_text;
                
                // Update visualizer bars based on "music sequence"
                const bars = document.querySelectorAll('.bar');
                data.music.sequence.forEach((note, i) => {
                    if (bars[i]) {
                        const h = (note / 500) * 100;
                        bars[i].style.height = `${h}px`;
                        bars[i].style.background = data.video.filter === 'GLITCH' ? 'var(--cinematic-red)' : 'var(--neon-blue)';
                    }
                });
            } catch (e) {
                console.error("Telemetry failed", e);
            }
        }

        setInterval(updateTelemetry, 500);
    </script>
</body>
</html>
