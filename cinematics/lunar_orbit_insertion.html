<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOI | LUNAR ORBIT INSERTION</title>
    <style>
        :root {
            --bg: #000500;
            --term-green: #00ff41;
            --term-dim: #003b0f;
            --nexus: #00ffff;
            --alert: #ff003c;
            --luna: #e0e0e0;
            --burn: #ff3c00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', 'Courier New', monospace; }

        body {
            background: transparent;
            color: var(--term-green);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .loi-container {
            width: 400px;
            height: 400px;
            border: 2px solid var(--burn);
            background: rgba(15, 5, 0, 0.9);
            position: relative;
            box-shadow: 0 0 40px rgba(255, 60, 0, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--term-dim);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .status-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .status-val {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--burn);
            text-shadow: 0 0 15px var(--burn);
        }

        .status-msg { font-size: 1rem; color: var(--nexus); margin-top: 10px; text-transform: uppercase; }

        .viz-container {
            position: relative;
            height: 180px;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .moon-large {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle at 30% 30%, var(--luna), #222);
            border-radius: 50%;
            position: absolute;
            right: -120px;
        }

        .orbit-path {
            width: 320px;
            height: 320px;
            border: 1px dashed rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            right: -155px;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .drone-group {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .drone {
            width: 8px;
            height: 8px;
            background: var(--nexus);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--nexus);
        }

        .retro-burn {
            width: 2px;
            height: 30px;
            background: linear-gradient(to top, var(--burn), transparent);
            margin-top: -35px;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.8; height: 30px; }
            50% { opacity: 1; height: 40px; }
        }

        .status-footer {
            margin-top: auto;
            border-top: 1px solid var(--term-dim);
            padding-top: 10px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .glitch {
            animation: glitch 0.2s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="loi-container glitch">
        <div class="header">
            <span>> SYSTEM_LUNAR_ORBIT</span>
            <span class="blink" style="color: var(--term-green);">[ STABLE ]</span>
        </div>

        <div class="status-box">
            <span class="status-val">1.63</span>
            <span class="status-msg">ORBITAL VELOCITY // KM/S</span>
        </div>

        <div class="viz-container">
            <div class="moon-large"></div>
            <div class="orbit-path">
                <div class="drone-group">
                    <div class="drone"></div>
                </div>
            </div>
        </div>

        <div class="status-footer">
            <span>ALTITUDE: 100 KM (LPO)</span>
            <span>STATUS: CAPTURED</span>
        </div>
    </div>
</body>
</html>
