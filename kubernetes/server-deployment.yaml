apiVersion: apps/v1
kind: Deployment
metadata:
  name: networkbuster-server
  labels:
    app: networkbuster
    component: server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: networkbuster
      component: server
  template:
    metadata:
      labels:
        app: networkbuster
        component: server
    spec:
      containers:
      - name: server
        image: networkbusterlo25gft5nqwzg.azurecr.io/networkbuster-server:latest
        ports:
        - containerPort: 3000
        - containerPort: 3001
        env:
        - name: PORT
          value: "3000"
        - name: SERVICE_NAME
          value: "Galactic-Core-Server"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        healthCheck:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: networkbuster-server-svc
spec:
  selector:
    app: networkbuster
    component: server
  ports:
  - name: http
    protocol: TCP
    port: 3000
    targetPort: 3000
  - name: api
    protocol: TCP
    port: 3001
    targetPort: 3001
  type: LoadBalancer
