<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEO PHASE 2 | STATUS MONITOR</title>
    <style>
        :root {
            --bg: #000500;
            --term-green: #00ff41;
            --term-dim: #003b0f;
            --nexus: #00ffff;
            --alert: #ff003c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', 'Courier New', monospace; }

        body {
            background: transparent;
            color: var(--term-green);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .leo-container {
            width: 400px;
            height: 400px;
            border: 2px solid var(--term-green);
            background: rgba(0, 10, 0, 0.9);
            position: relative;
            box-shadow: 0 0 20px var(--term-dim);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--term-dim);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .altitude-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .alt-val {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--term-green);
        }

        .alt-unit { font-size: 1rem; color: var(--nexus); }

        .viz-container {
            position: relative;
            height: 150px;
            width: 100%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .earth {
            width: 300px;
            height: 300px;
            border: 1px dashed var(--term-dim);
            border-radius: 50%;
            position: absolute;
            bottom: -220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit {
            width: 200px;
            height: 200px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 50%;
            position: absolute;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .drone {
            width: 6px;
            height: 6px;
            background: var(--nexus);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 8px var(--nexus);
        }

        .drone:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .drone:nth-child(2) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .drone:nth-child(3) { left: 0; top: 50%; transform: translateY(-50%); }
        .drone:nth-child(4) { right: 0; top: 50%; transform: translateY(-50%); }

        .status-footer {
            margin-top: auto;
            border-top: 1px solid var(--term-dim);
            padding-top: 10px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .scanline {
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.1);
            top: 0;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="leo-container">
        <div class="scanline"></div>
        <div class="header">
            <span>> SYSTEM_LEO_PHASE_2</span>
            <span class="blink" style="color: var(--nexus);">[ ACTIVE ]</span>
        </div>

        <div class="altitude-box">
            <span class="alt-val">800.00</span>
            <span class="alt-unit">KM ALTITUDE</span>
        </div>

        <div class="viz-container">
            <div class="earth">
                <div style="margin-top: -120px; font-size: 0.6rem; color: var(--term-dim);">TERRA_CORE</div>
            </div>
            <div class="orbit">
                <div class="drone"></div>
                <div class="drone"></div>
                <div class="drone"></div>
                <div class="drone"></div>
            </div>
        </div>

        <div class="status-footer">
            <span>VELOCITY: 7.67 KM/S</span>
            <span>SWARM: SYNCED</span>
        </div>
    </div>
</body>
</html>
