<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNAR CAPTURE | APPROACH</title>
    <style>
        :root {
            --bg: #000500;
            --term-green: #00ff41;
            --term-dim: #003b0f;
            --nexus: #00ffff;
            --alert: #ff003c;
            --luna: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', 'Courier New', monospace; }

        body {
            background: transparent;
            color: var(--term-green);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .capture-container {
            width: 400px;
            height: 400px;
            border: 2px solid var(--nexus);
            background: rgba(0, 5, 10, 0.9);
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--term-dim);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .status-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .status-val {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--nexus);
            text-shadow: 0 0 15px var(--nexus);
        }

        .status-msg { font-size: 1rem; color: var(--term-green); margin-top: 10px; }

        .viz-container {
            position: relative;
            height: 180px;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .moon {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, var(--luna), #444);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .crater {
            position: absolute;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
        }

        .target-reticle {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid var(--alert);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .swarm-approach {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .drone {
            width: 6px;
            height: 6px;
            background: var(--nexus);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--nexus);
            animation: approach 4s infinite linear;
        }

        @keyframes approach {
            0% { transform: translateX(50px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateX(-150px); opacity: 0; }
        }

        .status-footer {
            margin-top: auto;
            border-top: 1px solid var(--term-dim);
            padding-top: 10px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .ready-set {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        .active-step {
            color: #000;
            background: var(--term-green);
            padding: 2px 10px;
            border-radius: 2px;
        }

        .inactive-step {
            color: var(--term-dim);
            border: 1px solid var(--term-dim);
            padding: 2px 10px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="capture-container">
        <div class="header">
            <span>> SYSTEM_LUNAR_APPROACH</span>
            <span class="blink" style="color: var(--nexus);">[ READY_SET ]</span>
        </div>

        <div class="status-box">
            <div class="ready-set">
                <span class="active-step">READY</span>
                <span class="active-step">SET</span>
                <span class="inactive-step">GO</span>
            </div>
            <span class="status-msg">INTERCEPT PATH: SHACKLETON_CRATER</span>
        </div>

        <div class="viz-container">
            <div class="moon">
                <div class="crater" style="width: 20px; height: 20px; top: 70%; left: 40%;"></div>
                <div class="crater" style="width: 10px; height: 10px; top: 30%; left: 60%;"></div>
                <div class="target-reticle"></div>
            </div>
            <div class="swarm-approach">
                <div class="drone"></div>
                <div class="drone" style="animation-delay: 0.5s;"></div>
                <div class="drone" style="animation-delay: 1s;"></div>
            </div>
        </div>

        <div class="status-footer">
            <span>DIST_TO_LUNA: 12,450 KM</span>
            <span>VELOCITY: 1.25 KM/S</span>
        </div>
    </div>
</body>
</html>
