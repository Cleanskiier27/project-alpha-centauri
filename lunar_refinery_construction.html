<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFINERY HUB | CONSTRUCTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000505;
            --nexus: #00ffff;
            --term: #00ff41;
            --refinery: #bc13fe;
            --alert: #ff003c;
            --surface: rgba(188, 19, 254, 0.05);
            --border: rgba(188, 19, 254, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', monospace; }

        body {
            background: transparent;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .refinery-container {
            width: 400px;
            height: 400px;
            border: 2px solid var(--refinery);
            background: rgba(10, 0, 20, 0.9);
            position: relative;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--refinery);
            font-family: 'Orbitron', sans-serif;
        }

        .construction-status {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-card {
            border: 1px solid var(--border);
            padding: 5px;
            text-align: center;
            background: rgba(188, 19, 254, 0.05);
        }

        .stat-label { font-size: 0.6rem; color: rgba(188, 19, 254, 0.6); text-transform: uppercase; }
        .stat-val { font-size: 0.9rem; font-weight: bold; color: var(--refinery); }

        .viz-container {
            position: relative;
            flex: 1;
            width: 100%;
            margin-top: 5px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
        }

        .scaffold {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 80px;
            border: 1px dashed var(--refinery);
            border-bottom: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .core-unit {
            width: 60px;
            height: 40px;
            background: var(--refinery);
            box-shadow: 0 0 20px var(--refinery);
            position: relative;
            animation: assembly 4s infinite alternate;
        }

        .tank-fab {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 40px;
            height: 60px;
            border: 2px solid var(--nexus);
            border-radius: 20px 20px 5px 5px;
            background: rgba(0, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 15px var(--nexus);
        }

        .fab-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--nexus), #fff);
            animation: fill-tank 15s infinite linear;
            opacity: 0.8;
        }

        .transfer-pipe {
            position: absolute;
            bottom: 70px;
            right: 80px;
            width: 80px;
            height: 2px;
            background: rgba(0, 255, 255, 0.2);
            border-bottom: 1px dashed var(--nexus);
        }

        .flow-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--nexus);
            border-radius: 50%;
            top: -2px;
            animation: flow 2s infinite linear;
        }

        @keyframes flow {
            0% { left: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        @keyframes fill-tank {
            0% { height: 0%; }
            100% { height: 100%; }
        }

        .fab-beam {
            position: absolute;
            top: -20px;
            left: 50%;
            width: 2px;
            height: 100px;
            background: var(--nexus);
            box-shadow: 0 0 10px var(--nexus);
            transform: translateX(-50%);
            animation: fab-scan 2s infinite ease-in-out;
        }

        @keyframes fab-scan {
            0%, 100% { opacity: 0.2; transform: translateX(-20px); }
            50% { opacity: 1; transform: translateX(20px); }
        }

        @keyframes assembly {
            0% { transform: translateY(20px) scale(0.8); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .laser-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--refinery) 1px, transparent 1px);
            background-size: 100% 20px;
            opacity: 0.1;
            animation: laser-scan 2s infinite linear;
        }

        @keyframes laser-scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .steam-vent {
            position: absolute;
            width: 2px;
            height: 30px;
            background: linear-gradient(to top, #fff, transparent);
            top: -30px;
            left: 50%;
            opacity: 0;
            animation: vent 2s infinite ease-out;
        }

        @keyframes vent {
            0% { transform: translateY(0); opacity: 0.8; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .status-footer {
            margin-top: 10px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: var(--refinery);
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="refinery-container">
        <div class="header">
            <span>> HUB_CONSTRUCTION_BETA</span>
            <span class="blink">[ ASSEMBLING ]</span>
        </div>

        <div class="construction-status">
            <div class="stat-card">
                <div class="stat-label">COMPLETION</div>
                <div class="stat-val">34.7%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">THERMAL_LOAD</div>
                <div class="stat-val">420°C</div>
            </div>
        </div>

        <div class="viz-container">
            <div class="laser-grid"></div>
            
            <div class="scaffold">
                <div class="core-unit">
                    <div class="steam-vent"></div>
                    <div class="steam-vent" style="left: 20%; animation-delay: 0.5s;"></div>
                    <div class="steam-vent" style="left: 80%; animation-delay: 1s;"></div>
                </div>
            </div>

            <div class="tank-fab">
                <div class="fab-level"></div>
                <div class="fab-beam"></div>
            </div>

            <div class="transfer-pipe">
                <div class="flow-particle"></div>
                <div class="flow-particle" style="animation-delay: 0.5s;"></div>
                <div class="flow-particle" style="animation-delay: 1s;"></div>
            </div>

            <div style="position: absolute; bottom: 0; width: 100%; height: 40px; background: #111; border-top: 1px solid #333;"></div>
        </div>

        <div class="status-footer">
            <span>TYPE: VOLATILE_PROCESSOR</span>
            <span>PHASE: STRUCTURAL_SYNC</span>
        </div>
    </div>
</body>
</html>
