<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Studio | NetworkBuster</title>
    <style>
        :root {
            --bg: #020205;
            --panel: rgba(10, 10, 15, 0.9);
            --neon-blue: #00d4ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --text: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Inter', sans-serif; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .glass { background: var(--panel); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: 10px; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin-bottom: 10px; }
        .subtitle { font-size: 0.8rem; color: var(--neon-purple); text-transform: uppercase; letter-spacing: 5px; }
        
        .studio-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card-title { font-size: 0.9rem; color: var(--neon-purple); text-transform: uppercase; margin-bottom: 25px; border-bottom: 1px solid rgba(188, 19, 254, 0.3); padding-bottom: 10px; font-weight: 800; display: flex; justify-content: space-between; }
        
        .btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
        .btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
        .btn-purple { border-color: var(--neon-purple); color: var(--neon-purple); }
        .btn-purple:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 30px var(--neon-purple); }
        .btn-stop { border-color: #ff3131; color: #ff3131; }
        .btn-stop:hover { background: #ff3131; color: #fff; box-shadow: 0 0 30px #ff3131; }

        .viz-container { height: 200px; background: rgba(0,0,0,0.5); border-radius: 8px; margin-bottom: 20px; display: flex; align-items: flex-end; gap: 4px; padding: 10px; border: 1px solid #111; }
        .viz-bar { flex: 1; background: var(--neon-blue); transition: 0.1s; border-radius: 2px 2px 0 0; }
        
        .controls-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .control-item { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.7rem; }
        .control-item.active { border-color: var(--neon-blue); background: rgba(0, 212, 255, 0.1); color: var(--neon-blue); }

        .log-box { font-family: monospace; font-size: 0.75rem; color: #666; height: 120px; overflow-y: auto; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #111; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--neon-purple); padding-left: 8px; }
        
        .nav-links { position: absolute; top: 30px; left: 30px; display: flex; gap: 20px; }
        .nav-link { color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 800; transition: 0.3s; }
        .nav-link:hover { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="nav-links">
        <a href="http://localhost:3000" class="nav-link">➔ HUB</a>
        <a href="/audio-lab" class="nav-link">➔ AUDIO_LAB</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>MUSIC_STUDIO</h1>
            <div class="subtitle">NEURAL_AUDIO_SYNTHESIS_ENGINE</div>
        </div>

        <div class="studio-grid">
            <div class="main-workspace">
                <div class="glass">
                    <div class="card-title">
                        Live Algorithmic Workspace
                        <span id="active-params" style="font-size: 0.6rem; opacity: 0.5;">WAVE: TRI | SCALE: MAJOR</span>
                    </div>
                    
                    <div class="viz-container" id="visualizer">
                        <!-- Bars generated by JS -->
                    </div>

                    <div class="controls-group" id="wave-controls">
                        <div class="control-item" onclick="setWave('sine', this)">SINE</div>
                        <div class="control-item" onclick="setWave('square', this)">SQUARE</div>
                        <div class="control-item" onclick="setWave('sawtooth', this)">SAWTOOTH</div>
                        <div class="control-item active" onclick="setWave('triangle', this)">TRIANGLE</div>
                    </div>

                    <div class="controls-group" id="scale-controls">
                        <div class="control-item active" onclick="setScale('major', this)">MAJOR_SCALE</div>
                        <div class="control-item" onclick="setScale('minor', this)">MINOR_SCALE</div>
                        <div class="control-item" onclick="setScale('pentatonic', this)">PENTATONIC</div>
                        <div class="control-item" onclick="setScale('chromatic', this)">CHROMATIC</div>
                    </div>

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                        <button class="btn" onclick="composeAndPlay()">EXECUTE_COMPOSITION</button>
                        <button class="btn btn-stop" onclick="stopAll()">STOP_AUDIO</button>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="glass">
                    <div class="card-title">Export Engine</div>
                    <button class="btn btn-purple" style="margin-bottom: 15px;" onclick="downloadMidi()">GENERATE_MIDI</button>
                    <button class="btn btn-purple" onclick="downloadWav()">SYNTHESIZE_WAV</button>
                </div>

                <div class="glass">
                    <div class="card-title">System Telemetry</div>
                    <div class="log-box" id="log">
                        <div class="log-entry">SYSTEM_READY</div>
                        <div class="log-entry">OSCILLATOR_LOADED</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let activeNodes = [];
        let currentWave = 'triangle';
        let currentScale = 'major';

        const scales = {
            major: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25],
            minor: [261.63, 293.66, 311.13, 349.23, 392.00, 415.30, 466.16, 523.25],
            pentatonic: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25],
            chromatic: [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88]
        };

        // Init Viz
        const viz = document.getElementById('visualizer');
        for(let i=0; i<32; i++) {
            const bar = document.createElement('div');
            bar.className = 'viz-bar';
            bar.style.height = '10%';
            viz.appendChild(bar);
        }

        function log(msg) {
            const l = document.getElementById('log');
            const e = document.createElement('div');
            e.className = 'log-entry';
            e.textContent = \`[\${new Date().toLocaleTimeString()}] \${msg}\`;
            l.prepend(e);
        }

        function setWave(w, el) {
            currentWave = w.toLowerCase();
            document.querySelectorAll('#wave-controls .control-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            updateStatus();
            log(\`WAVEFORM_SET: \${w.toUpperCase()}\`);
        }

        function setScale(s, el) {
            currentScale = s.toLowerCase();
            document.querySelectorAll('#scale-controls .control-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            updateStatus();
            log(\`SCALE_SET: \${s.toUpperCase()}\`);
        }

        function updateStatus() {
            document.getElementById('active-params').textContent = \`WAVE: \${currentWave.toUpperCase()} | SCALE: \${currentScale.toUpperCase()}\`;
        }

        function stopAll() {
            activeNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            activeNodes = [];
            log('AUDIO_TERMINATED');
        }

        function playNote(freq, start, duration) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = currentWave;
            osc.frequency.setValueAtTime(freq, start);
            
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(0.2, start + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(start);
            osc.stop(start + duration);
            activeNodes.push(osc);

            // Viz pulse
            setTimeout(() => {
                const bars = document.querySelectorAll('.viz-bar');
                const b = bars[Math.floor(Math.random() * bars.length)];
                b.style.height = '90%';
                b.style.background = 'var(--neon-purple)';
                setTimeout(() => {
                    b.style.height = '10%';
                    b.style.background = 'var(--neon-blue)';
                }, 200);
            }, (start - audioCtx.currentTime) * 1000);
        }

        function composeAndPlay() {
            stopAll();
            log('COMPOSING_NEW_SEQUENCE...');
            const notes = scales[currentScale];
            let now = (audioCtx || new AudioContext()).currentTime + 0.1;
            
            for(let i=0; i<16; i++) {
                const freq = notes[Math.floor(Math.random() * notes.length)];
                playNote(freq, now + (i * 0.25), 0.3);
            }
        }

        function downloadMidi() { 
            log('GENERATING_MIDI_FILE... (SERVER_CALLBACK)'); 
            fetch('/api/audio/synthesize', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({frequency: 440, duration: 1000, waveform: 'sine'})
            }).then(r=>r.json()).then(d=>log('MIDI_EXPORT_READY: ' + d.downloadUrl));
        }
        function downloadWav() { 
            log('SYNTHESIZING_WAV_FILE... (SERVER_CALLBACK)');
            fetch('/api/audio/synthesize', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({frequency: 440, duration: 1000, waveform: currentWave})
            }).then(r=>r.json()).then(d=>log('WAV_EXPORT_READY: ' + d.downloadUrl));
        }
    </script>
</body>
</html>
