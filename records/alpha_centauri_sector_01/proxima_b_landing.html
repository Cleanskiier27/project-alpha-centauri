<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXIMA B | LANDING HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000005;
            --nexus: #00ffff;
            --entry: #ff3c00;
            --safe: #00ff41;
            --border: rgba(0, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', monospace; }

        body {
            background: transparent;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .landing-container {
            width: 450px;
            height: 450px;
            border: 2px solid var(--nexus);
            background: rgba(0, 5, 10, 0.95);
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--nexus);
            font-family: 'Orbitron', sans-serif;
        }

        .altitude-box {
            text-align: center;
            margin: 20px 0;
        }

        .alt-val {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--nexus);
            text-shadow: 0 0 20px var(--nexus);
        }

        .alt-unit { font-size: 1rem; color: var(--safe); letter-spacing: 4px; }

        .viz-container {
            position: relative;
            flex: 1;
            width: 100%;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .surface-horizon {
            width: 200%;
            height: 100px;
            background: linear-gradient(to top, #111, #333);
            border-top: 2px solid #555;
            transform: rotate(-1deg);
        }

        .descent-module {
            position: absolute;
            bottom: 300px;
            left: 50%;
            width: 30px;
            height: 40px;
            background: var(--nexus);
            transform: translateX(-50%);
            border-radius: 5px 5px 2px 2px;
            box-shadow: 0 0 20px var(--nexus);
            animation: descent-anim 10s infinite linear;
        }

        @keyframes descent-anim {
            0% { bottom: 350px; transform: translateX(-50%) scale(1.5); }
            100% { bottom: 100px; transform: translateX(-50%) scale(1); }
        }

        .heat-glow {
            position: absolute;
            bottom: -20px;
            width: 100%;
            height: 40px;
            background: radial-gradient(ellipse at center, var(--entry), transparent 70%);
            opacity: 0.8;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.6; height: 35px; }
            50% { opacity: 1; height: 45px; }
        }

        .nav-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        .status-footer {
            margin-top: 15px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: var(--safe);
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="header">
            <span>> DESCENT_INITIATED</span>
            <span class="blink">[ ATMO_ENTRY ]</span>
        </div>

        <div class="altitude-box">
            <span class="alt-val" id="altVal">42.8</span><br>
            <span class="alt-unit">KM ALTITUDE</span>
        </div>

        <div class="viz-container">
            <div class="nav-grid"></div>
            <div class="descent-module">
                <div class="heat-glow"></div>
            </div>
            <div class="surface-horizon"></div>
        </div>

        <div class="status-footer">
            <span>VELOCITY: 4.2 KM/S</span>
            <span>TARGET: TERMINATOR_01</span>
        </div>
    </div>

    <script>
        let alt = 42.8;
        const altEl = document.getElementById('altVal');
        setInterval(() => {
            alt -= 0.1;
            if (alt < 0.1) alt = 42.8;
            altEl.innerText = alt.toFixed(1);
        }, 100);
    </script>
</body>
</html>
