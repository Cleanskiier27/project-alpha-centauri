<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIELD BYPASS | DEPLOYMENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050005;
            --nexus: #00ffff;
            --bypass: #ff00ff;
            --alert: #ff003c;
            --border: rgba(255, 0, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', monospace; }

        body {
            background: transparent;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .bypass-container {
            width: 450px;
            height: 450px;
            border: 2px solid var(--bypass);
            background: rgba(15, 0, 15, 0.95);
            position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.2);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--bypass);
            font-family: 'Orbitron', sans-serif;
        }

        .bypass-status {
            text-align: center;
            margin-bottom: 20px;
        }

        .status-val {
            font-size: 2rem;
            font-weight: bold;
            color: var(--nexus);
            text-shadow: 0 0 15px var(--nexus);
        }

        .viz-container {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--nexus);
            box-shadow: 0 0 20px var(--nexus);
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.8;
        }

        .bypass-gap {
            position: absolute;
            width: 80px;
            height: 20px;
            background: var(--bg);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--bypass);
            z-index: 10;
            box-shadow: 0 0 30px var(--bypass);
        }

        .bot-unit {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--bypass);
            border-radius: 50%;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: bypass-deploy 3s infinite ease-in;
        }

        @keyframes bypass-deploy {
            0% { bottom: -20px; transform: translateX(-50%) scale(1); opacity: 0; }
            20% { opacity: 1; }
            50% { bottom: 50%; transform: translate(-50%, -50%) scale(0.5); }
            100% { bottom: 120%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
        }

        .quantum-interference {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent, rgba(255, 0, 255, 0.05) 2px, transparent 4px);
            pointer-events: none;
            animation: interference 0.1s infinite;
        }

        @keyframes interference {
            0% { opacity: 0.5; }
            100% { opacity: 0.8; }
        }

        .status-footer {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: var(--bypass);
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="bypass-container">
        <div class="header">
            <span>> SHIELD_BYPASS_INIT</span>
            <span class="blink">[ TUNNELING ]</span>
        </div>

        <div class="bypass-status">
            <span class="status-val">QUANTUM_TUNNEL_01</span><br>
            <span style="font-size: 0.6rem; color: var(--bypass);">STABILITY: 94.2%</span>
        </div>

        <div class="viz-container">
            <div class="quantum-interference"></div>
            <div class="shield-line"></div>
            <div class="bypass-gap"></div>
            <div class="bot-unit"></div>
            <div class="bot-unit" style="animation-delay: 1s;"></div>
            <div class="bot-unit" style="animation-delay: 2s;"></div>
        </div>

        <div class="status-footer">
            <span>BOT_TYPE: BIGTREE_INFILTRATOR</span>
            <span>DEST: SECTOR_02_DEEP</span>
        </div>
    </div>
</body>
</html>
